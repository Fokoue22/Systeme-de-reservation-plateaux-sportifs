apiVersion: v1
kind: Secret
metadata:
  name: reservation-secrets
  namespace: reservation
  labels:
    app: reservation
    component: secrets
type: Opaque
stringData:
  # Database Credentials
  DB_PASSWORD: "reservation_password"
  
  # Security
  SECRET_KEY: "your-secret-key-change-in-production"
  
  # Email Configuration (optional)
  SMTP_PASSWORD: ""
  
  # SMS Configuration (optional)
  TWILIO_AUTH_TOKEN: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: reservation
  labels:
    app: reservation
    component: database
type: Opaque
stringData:
  POSTGRES_USER: "reservation_user"
  POSTGRES_PASSWORD: "reservation_password"
  POSTGRES_DB: "reservation_db"

---
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry
  namespace: reservation
  labels:
    app: reservation
    component: registry
type: kubernetes.io/dockercfg
data:
  # This is optional - only needed if pulling from private registry
  # Generate with: kubectl create secret docker-registry docker-registry --docker-server=<server> --docker-username=<user> --docker-password=<password> --docker-email=<email> -n reservation --dry-run=client -o yaml
  .dockercfg: eyJsb2NhbGhvc3Q6NTAwMCI6eyJhdXRoIjoiIn19

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: reservation

# Common labels applied to all resources
commonLabels:
  app: reservation
  managed-by: kustomize

# Common annotations applied to all resources
commonAnnotations:
  deployment-tool: kustomize
  version: "1.0.0"

# Resources to include
resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - postgres/pvc.yaml
  - postgres/deployment.yaml
  - postgres/service.yaml
  - api/deployment.yaml
  - api/service.yaml
  - api/hpa.yaml
  - api/pdb.yaml
  - api/rbac.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - frontend/ingress.yaml
  - frontend/hpa.yaml

# Image replacements
images:
  - name: reservation-api
    newName: reservation-api
    newTag: latest
  - name: reservation-frontend
    newName: reservation-frontend
    newTag: latest
  - name: postgres
    newName: postgres
    newTag: "15-alpine"

# Replicas override
replicas:
  - name: api
    count: 2
  - name: frontend
    count: 2
  - name: postgres
    count: 1

# Patches for specific resources
patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: api
    spec:
      template:
        spec:
          containers:
          - name: api
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"

# ConfigMap generator
configMapGenerator:
  - name: reservation-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - DEBUG=false

# Vars for cross-resource references
vars:
  - name: NAMESPACE
    objref:
      kind: Namespace
      name: reservation
      apiVersion: v1
    fieldref:
      fieldpath: metadata.name

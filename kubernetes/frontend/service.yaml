apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: reservation
  labels:
    app: reservation
    component: frontend
  annotations:
    description: "Frontend web server service"
spec:
  type: ClusterIP
  selector:
    app: reservation
    component: frontend
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  sessionAffinity: None

apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: reservation
  labels:
    app: reservation
    component: database
  annotations:
    description: "PostgreSQL database service"
spec:
  type: ClusterIP
  selector:
    app: reservation
    component: database
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
    protocol: TCP
  sessionAffinity: None

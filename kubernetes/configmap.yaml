apiVersion: v1
kind: ConfigMap
metadata:
  name: reservation-config
  namespace: reservation
  labels:
    app: reservation
    component: config
data:
  # Application Configuration
  ENVIRONMENT: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  
  # API Configuration
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "4"
  
  # Database Configuration
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "reservation_db"
  DB_USER: "reservation_user"
  
  # Notification Service
  NOTIFICATION_SERVICE_URL: "http://notification-service:8001"
  
  # Session Configuration
  SESSION_TIMEOUT_MINUTES: "1440"
  
  # Nginx Configuration
  NGINX_WORKER_PROCESSES: "auto"
  NGINX_WORKER_CONNECTIONS: "1024"
  NGINX_GZIP: "on"
  NGINX_GZIP_TYPES: "text/plain text/css text/javascript application/json application/javascript"
  NGINX_GZIP_MIN_LENGTH: "1000"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: reservation
  labels:
    app: reservation
    component: frontend
data:
  nginx.conf: |
    # Nginx configuration for frontend and API proxy
    
    upstream api {
        server api-service:8000;
    }
    
    server {
        listen 80;
        server_name _;
        client_max_body_size 10M;
    
        # Gzip compression
        gzip on;
        gzip_types text/plain text/css text/javascript application/json application/javascript;
        gzip_min_length 1000;
    
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    
        # API proxy
        location /api/ {
            proxy_pass http://api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
            proxy_request_buffering off;
        }
    
        # API routes without /api prefix (for backward compatibility)
        location ~ ^/(plateaux|reservations|disponibilites|notifications|auth|register|login|logout) {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
            proxy_request_buffering off;
        }
    
        # Static files
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    
        location /Images/ {
            alias /usr/share/nginx/html/Images/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    
        # HTML files
        location ~ \.html$ {
            root /usr/share/nginx/html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
    
        # Root location
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
    
        # Deny access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    
        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

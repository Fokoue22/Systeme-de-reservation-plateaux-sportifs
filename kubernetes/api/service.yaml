apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: reservation
  labels:
    app: reservation
    component: api
  annotations:
    description: "API backend service"
spec:
  type: ClusterIP
  selector:
    app: reservation
    component: api
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  sessionAffinity: None

# Development Environment Values

global:
  environment: development
  domain: dev.reservation.local
  registry: 671765845629.dkr.ecr.us-east-1.amazonaws.com
  imagePullPolicy: Always

api:
  enabled: true
  replicaCount: 1
  
  image:
    tag: dev
  
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
  
  ingress:
    hosts:
      - host: api.dev.reservation.local
        paths:
          - path: /
            pathType: Prefix

frontend:
  enabled: true
  replicaCount: 1
  
  image:
    tag: dev
  
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
  
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
  
  ingress:
    hosts:
      - host: dev.reservation.local
        paths:
          - path: /
            pathType: Prefix

namespace:
  name: reservation-dev

security:
  networkPolicy:
    enabled: false
  rbac:
    enabled: true

<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inscription - Reservation Sportive</title>
    <link rel="icon"  href="Images/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/auth.css?v=20260419b" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card auth-single">
        <header class="auth-header">
          <div class="brand">
            <span class="brand-mark">RS</span>
            <span class="brand-text">Reservation Sportive</span>
          </div>
          <h1>Inscription</h1>
          <p>Creez votre compte et accedez aux reservations sportives.</p>
        </header>

        <form id="registerForm" class="auth-form">
          <label>Nom complet
            <input type="text" name="full_name" placeholder="Jean Dupont" required />
          </label>
          <label>Nom utilisateur
            <input type="text" name="username" placeholder="jean.dupont" minlength="3" required />
          </label>
          <label>Email
            <input type="email" name="email" placeholder="jean@example.com" required />
          </label>
          <label>Telephone
            <input type="text" name="telephone" placeholder="+1 (514) 123-4567" />
          </label>
          <label>Mot de passe
            <div class="input-with-icon">
              <input id="passwordInput" type="password" name="password" minlength="6" placeholder="Minimum 6 caracteres" required />
              <button class="password-toggle" type="button" data-target="passwordInput" aria-label="Afficher le mot de passe" title="Afficher le mot de passe">
                <svg class="eye-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6S2 12 2 12z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </label>
          <label>Confirmer le mot de passe
            <div class="input-with-icon">
              <input id="passwordConfirmInput" type="password" name="password_confirm" minlength="6" placeholder="Retapez le mot de passe" required />
              <button class="password-toggle" type="button" data-target="passwordConfirmInput" aria-label="Afficher la confirmation du mot de passe" title="Afficher la confirmation du mot de passe">
                <svg class="eye-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6S2 12 2 12z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </label>
          <label class="checkline">
            <input type="checkbox" name="terms" required />
            <span>J'ai lu et j'accepte les conditions d'utilisation.</span>
          </label>
          <button type="submit" class="btn primary">S'inscrire</button>
        </form>

        <p id="registerFlash" class="flash" role="status" aria-live="polite"></p>
        <p class="switch-link">Deja un compte ? <a href="/login">Se connecter</a></p>
      </section>
    </main>

    <script src="/static/js/auth_register.js?v=20260418a" defer></script>
  </body>
</html>

<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calendrier - Reservation Sportive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/calendar.css?v=20260412" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">RS</span>
        <span class="brand-text">Reservation Sportive</span>
      </div>
      <nav class="sport-tabs" id="sportTabs"></nav>
      <div class="quick-icons" aria-label="Actions rapides">
        <button class="icon-btn" type="button" title="Accueil" aria-label="Accueil">🏠</button>
        <button class="icon-btn active" type="button" title="Calendrier" aria-label="Calendrier">📅</button>
        <button class="icon-btn" type="button" title="Messages" aria-label="Messages">💬</button>
        <button class="icon-btn" type="button" title="Parametres" aria-label="Parametres">⚙️</button>
      </div>
      <div class="top-actions">
        <button id="todayBtn" class="btn ghost">Aujourd'hui</button>
        <input id="dateInput" type="date" />
        <button class="profile-chip" type="button" aria-label="Profil utilisateur">
          <span class="avatar">SM</span>
          <span>Simon Martins</span>
        </button>
      </div>
    </header>

    <main class="layout">
      <section class="calendar-panel">
        <div class="calendar-header">
          <h1>Planning des plateaux</h1>
          <p id="subtitle">Chargement...</p>
        </div>
        <div class="calendar-wrap" id="calendarWrap">
          <div class="time-column" id="timeColumn"></div>
          <div class="lanes" id="lanes"></div>
        </div>
      </section>

      <aside class="booking-panel">
        <h2>Nouvelle reservation</h2>
        <form id="bookingForm">
          <label>Utilisateur
            <input type="text" name="utilisateur" placeholder="Nom utilisateur" required />
          </label>
          <label>Plateau
            <select name="plateau_id" id="plateauSelect" required></select>
          </label>
          <label>Date
            <input type="date" name="date_reservation" id="formDate" required />
          </label>
          <div class="grid2">
            <label>Debut
              <input type="time" name="debut" required />
            </label>
            <label>Fin
              <input type="time" name="fin" required />
            </label>
          </div>
          <button class="btn primary" type="submit">Creer la reservation</button>
        </form>

        <div class="legend">
          <h3>Legende</h3>
          <p><span class="dot confirmed"></span> Confirmee</p>
          <p><span class="dot waitlisted"></span> Liste d'attente</p>
          <p><span class="dot cancelled"></span> Annulee</p>
        </div>

        <div id="flash" class="flash" role="status" aria-live="polite"></div>
      </aside>
    </main>

    <script src="/static/js/calendar.js?v=20260412" defer></script>
  </body>
</html>
